<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline · Katei</title>
    <meta name="theme-color" content="#f5f1f0">
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --surface: #f5f1f0;
        --text: #42443c;
        --muted: #8f8076;
        --accent: #df2b07;
        --border: #d8cbc5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Poppins, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(100%, 32rem);
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1rem;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        background: var(--accent);
        color: #ffffff;
      }

      a {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Katei can't reach the network right now.</p>
      <p>Boards and workspace changes are not available offline in this first PWA cut.</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try again</button>
        <a href="/">Go to home</a>
      </div>
    </main>
  </body>
</html>
