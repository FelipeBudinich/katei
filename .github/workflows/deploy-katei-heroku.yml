name: Deploy Katei to Heroku

on:
  push:
    branches:
      - main
    paths:
      - "apps/katei/**"
      - "packages/brand/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-katei-heroku.yml"
      - "!apps/katei/**/*.md"
      - "!packages/brand/**/*.md"
  workflow_dispatch:

concurrency:
  group: heroku-katei-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Prebuild Katei CSS in monorepo context
        run: npm run prepare:subtree:katei

      - name: Verify generated CSS exists
        run: test -f apps/katei/public/assets/app.css

      - name: Select target app
        run: |
          heroku_app_name="${{ secrets.HEROKU_KATEI_APP_PROD }}"
          echo "HEROKU_APP_NAME=${heroku_app_name:-YOUR_HEROKU_APP_NAME}" >> "$GITHUB_ENV"

      - name: Select deploy credentials
        run: |
          heroku_api_key="${{ secrets.HEROKU_API_KEY }}"
          echo "HEROKU_API_KEY=${heroku_api_key:-YOUR_HEROKU_API_KEY}" >> "$GITHUB_ENV"

      - name: Validate deploy secrets
        run: |
          test -n "$HEROKU_APP_NAME" || { echo "Missing HEROKU_APP_NAME"; exit 1; }
          test "$HEROKU_APP_NAME" != "YOUR_HEROKU_APP_NAME" || { echo "Replace YOUR_HEROKU_APP_NAME with the real Heroku app slug or set HEROKU_KATEI_APP_PROD as a GitHub repository secret"; exit 1; }
          test -n "$HEROKU_API_KEY" || { echo "Missing HEROKU_API_KEY"; exit 1; }
          test "$HEROKU_API_KEY" != "YOUR_HEROKU_API_KEY" || { echo "Replace YOUR_HEROKU_API_KEY with a real Heroku API key as a Github Repository secret"; exit 1; }
          echo "Deploying branch '${GITHUB_REF_NAME}' to app '${HEROKU_APP_NAME}'"

      - name: Set PWA build id
        run: |
          echo "PWA_BUILD_ID=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Prepare deploy directory
        run: |
          rm -rf "$RUNNER_TEMP/katei-deploy"
          mkdir -p "$RUNNER_TEMP/katei-deploy"
          rsync -a apps/katei/ "$RUNNER_TEMP/katei-deploy/"
          cd "$RUNNER_TEMP/katei-deploy"
          node ./scripts/build_pwa_assets.mjs
          test -f public/sw.js

      - name: Verify Heroku git remote
        run: |
          cd "$RUNNER_TEMP/katei-deploy"
          git init
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git ls-remote heroku >/dev/null

      - name: Deploy to Heroku
        run: |
          cd "$RUNNER_TEMP/katei-deploy"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy Katei from ${GITHUB_SHA}"
          git branch -M main
          git push heroku HEAD:main --force
