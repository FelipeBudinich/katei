name: Deploy Hanmoto to Heroku

on:
  push:
    branches:
      - main
    paths:
      - "apps/hanmoto/**"
      - "packages/brand/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hanmoto-heroku.yml"
  workflow_dispatch:

concurrency:
  group: heroku-katei-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm ci

      - name: Prebuild Hanmoto CSS in monorepo context
        run: npm run prepare:subtree:hanmoto

      - name: Verify generated CSS exists
        run: test -f apps/hanmoto/public/assets/app.css

      - name: Create temporary deploy commit
        id: prep
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/hanmoto/public/assets/app.css

          if ! git diff --cached --quiet; then
            git commit -m "Build Hanmoto CSS for Heroku deploy"
          fi

          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Split Hanmoto subtree
        id: split
        run: |
          echo "sha=$(git subtree split --prefix=apps/hanmoto ${{ steps.prep.outputs.ref }})" >> "$GITHUB_OUTPUT"

      - name: Configure Heroku auth
        run: |
          cat > ~/.netrc <<EOF
          machine api.heroku.com
            login ${{ secrets.HEROKU_EMAIL }}
            password ${{ secrets.HEROKU_API_KEY }}
          machine git.heroku.com
            login ${{ secrets.HEROKU_EMAIL }}
            password ${{ secrets.HEROKU_API_KEY }}
          EOF
          chmod 600 ~/.netrc

      - name: Deploy subtree to Heroku
        run: |
          git push https://git.heroku.com/${{ vars.HEROKU_APP_NAME }}.git \
            ${{ steps.split.outputs.sha }}:main --force
